<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>
    <video controls autoplay loop width="500" poster="imgens/gato.jpg">
        <source src="midias/Meu-Video-720.webm" type="video/webm">
        <source src="midias/Meu-Video-720.mkx" type="video/mkv">
        <source src="midias/Meu-Video-720.mp4" type="video/mp4">
        <source src="midias/Meu-Video-720.ogv" type="video/ogg">
        <source src="midias/meu-video.mp4" type="video/mp4">
        <P>Seu navegador não tem compatibilidade com reprodução de vídeos.</P>
    </video>
    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/3hng-hmSv2Y?si=FrHabLZl8HnHvq4F" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>Inserindo vídeos do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/7466309?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="420" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write" title="KIRboard Cat"></iframe>
</body>
</html>
